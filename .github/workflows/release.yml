name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build runtime jar
        run: mvn -B package

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p target/release-assets
          cp miku-xlsx2md/target/miku-xlsx2md-*.jar target/release-assets/
          rm -f target/release-assets/original-*.jar
          ls -l target/release-assets

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" target/release-assets/*.jar --clobber
          else
            gh release create "$RELEASE_TAG" target/release-assets/*.jar \
              --title "$RELEASE_TAG" \
              --notes "Release asset generated by GitHub Actions."
          fi
